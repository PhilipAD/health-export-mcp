<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 340" width="1040" height="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1040" height="340" rx="20" fill="#0B1020"/>
  <rect x="0" y="0" width="1040" height="340" rx="20" fill="url(#g)" opacity="0.5"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11173a"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="mcp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#5B3DF5"/>
    </linearGradient>
  </defs>

  <text x="40" y="50" fill="#8C93B5" font-size="15" font-weight="600" letter-spacing="2">APPLE HEALTH  →  YOUR AI AGENT, OVER MCP</text>

  <!-- Stage 1: Apple Health -->
  <g>
    <rect x="40" y="100" width="190" height="140" rx="16" fill="#161D3F" stroke="#2A3160" stroke-width="1.5"/>
    <text x="135" y="140" fill="#FF4D6D" font-size="30" text-anchor="middle">❤</text>
    <text x="135" y="178" fill="#F4F6FF" font-size="18" font-weight="700" text-anchor="middle">Apple Health</text>
    <text x="135" y="202" fill="#8C93B5" font-size="13" text-anchor="middle">iPhone · Watch</text>
    <text x="135" y="222" fill="#8C93B5" font-size="13" text-anchor="middle">190 metrics</text>
  </g>

  <!-- Stage 2: Export destinations -->
  <g>
    <rect x="290" y="100" width="190" height="140" rx="16" fill="#161D3F" stroke="#2A3160" stroke-width="1.5"/>
    <text x="385" y="143" fill="#F4F6FF" font-size="15" font-weight="700" text-anchor="middle">Export (read-only)</text>
    <text x="385" y="175" fill="#A8AEcF" font-size="13.5" text-anchor="middle">iCloud Drive</text>
    <text x="385" y="198" fill="#A8AEcF" font-size="13.5" text-anchor="middle">Local folder</text>
    <text x="385" y="221" fill="#A8AEcF" font-size="13.5" text-anchor="middle">LAN · WebSocket</text>
  </g>

  <!-- Stage 3: MCP server -->
  <g>
    <rect x="540" y="100" width="200" height="140" rx="16" fill="url(#mcp)"/>
    <text x="640" y="138" fill="#fff" font-size="16" font-weight="800" text-anchor="middle">health-export-mcp</text>
    <text x="640" y="162" fill="#E6E1FF" font-size="12.5" text-anchor="middle">zero-dependency</text>
    <text x="640" y="182" fill="#E6E1FF" font-size="12.5" text-anchor="middle">MCP server · stdio</text>
    <text x="640" y="210" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">7 query tools</text>
  </g>

  <!-- Stage 4: AI agents -->
  <g>
    <rect x="800" y="100" width="200" height="140" rx="16" fill="#161D3F" stroke="#2A3160" stroke-width="1.5"/>
    <text x="900" y="135" fill="#F4F6FF" font-size="15" font-weight="700" text-anchor="middle">Your AI agent</text>
    <text x="900" y="164" fill="#A8AEcF" font-size="13" text-anchor="middle">Claude · Cursor</text>
    <text x="900" y="185" fill="#A8AEcF" font-size="13" text-anchor="middle">opencode</text>
    <text x="900" y="206" fill="#A8AEcF" font-size="13" text-anchor="middle">OpenClaw · Hermes</text>
    <text x="900" y="227" fill="#A8AEcF" font-size="13" text-anchor="middle">ChatGPT · Gemini · Grok*</text>
  </g>

  <!-- arrows -->
  <g fill="#5B3DF5">
    <polygon points="236,170 262,160 262,180"/>
    <polygon points="486,170 512,160 512,180"/>
    <polygon points="746,170 772,160 772,180"/>
  </g>

  <text x="40" y="300" fill="#6B7299" font-size="12.5">Read-only · local-first · no developer server in the path · your data goes only where you point it.</text>
  <text x="40" y="320" fill="#6B7299" font-size="12.5">*MCP clients query the server directly; ChatGPT / Gemini / Grok / n8n / Home Assistant consume the same data via webhook.</text>
</svg>
