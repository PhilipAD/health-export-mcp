<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1280" width="1280" height="1280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11173a"/>
      <stop offset="0.55" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="mcp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#5B3DF5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.30" r="0.6">
      <stop offset="0" stop-color="#7C5CFF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="1280" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="1280" fill="url(#glow)"/>

  <!-- banner content, vertically centered in the 1280x1280 (lives in rows 320-960) -->
  <g transform="translate(0,320)">
    <!-- MCP pill -->
    <g transform="translate(80,70)">
      <rect x="0" y="0" width="300" height="42" rx="21" fill="#1A2148" stroke="#2E376E" stroke-width="1.5"/>
      <circle cx="27" cy="21" r="7" fill="#7C5CFF"/>
      <text x="48" y="27" fill="#C9CEF0" font-size="16" font-weight="600" letter-spacing="0.5">Model Context Protocol server</text>
    </g>

    <!-- Title -->
    <text x="80" y="214" fill="#FFFFFF" font-size="80" font-weight="800" letter-spacing="-1.5">health-export-mcp</text>
    <text x="82" y="276" fill="#A9B0E0" font-size="34" font-weight="500">Apple Health <tspan fill="#7C5CFF" font-weight="700">&#8594;</tspan> your AI agent, over MCP</text>

    <!-- description -->
    <text x="82" y="330" fill="#7C7FA6" font-size="23">190 Apple Health metrics as clean JSON — read-only, local-first.</text>

    <!-- chips -->
    <g font-size="20" font-weight="700">
      <g transform="translate(80,372)"><rect width="172" height="48" rx="12" fill="#161D3F" stroke="#2A3160" stroke-width="1.5"/><text x="86" y="31" text-anchor="middle" fill="#EDEFFA">190 metrics</text></g>
      <g transform="translate(268,372)"><rect width="162" height="48" rx="12" fill="#161D3F" stroke="#2A3160" stroke-width="1.5"/><text x="81" y="31" text-anchor="middle" fill="#EDEFFA">7 MCP tools</text></g>
      <g transform="translate(446,372)"><rect width="224" height="48" rx="12" fill="#161D3F" stroke="#2A3160" stroke-width="1.5"/><text x="112" y="31" text-anchor="middle" fill="#EDEFFA">zero-dependency</text></g>
      <g transform="translate(686,372)"><rect width="156" height="48" rx="12" fill="#161D3F" stroke="#2A3160" stroke-width="1.5"/><text x="78" y="31" text-anchor="middle" fill="#EDEFFA">read-only</text></g>
    </g>

    <!-- works with -->
    <text x="82" y="476" fill="#6B7099" font-size="18" font-weight="600" letter-spacing="1">WORKS WITH</text>
    <text x="82" y="510" fill="#C9CEF0" font-size="24" font-weight="600">Claude &#183; Cursor &#183; ChatGPT &#183; opencode &#183; OpenClaw &#183; Hermes</text>

    <!-- repo url -->
    <text x="82" y="572" fill="#5A6090" font-size="20" font-weight="600">github.com/PhilipAD/health-export-mcp</text>

    <!-- right accent: MCP cube -->
    <g transform="translate(1000,150)">
      <rect x="0" y="0" width="170" height="120" rx="22" fill="url(#mcp)"/>
      <text x="85" y="54" text-anchor="middle" fill="#fff" font-size="24" font-weight="800">MCP</text>
      <text x="85" y="84" text-anchor="middle" fill="#E6E1FF" font-size="15">7 tools &#183; stdio</text>
    </g>
  </g>
</svg>
